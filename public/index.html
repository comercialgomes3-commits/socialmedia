<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7fbff;
    --surface: rgba(255,255,255,0.92);
    --surface-soft: #ffffff;
    --border: #dbeafe;
    --accent: #2f8ff0;
    --accent-dark: #1f6fd1;
    --accent-dim: rgba(47,143,240,0.10);
    --text: #20243a;
    --muted: #7b8498;
    --error: #ef4444;
    --sans: 'Syne', sans-serif;
    --mono: 'Space Mono', monospace;
  }

  html, body {
    min-height: 100%;
    background:
      radial-gradient(circle at 50% 0%, rgba(47,143,240,0.14), transparent 38%),
      linear-gradient(180deg, #ffffff 0%, #eef7ff 100%);
    color: var(--text);
    font-family: var(--sans);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 15% 20%, rgba(47,143,240,0.10), transparent 24%),
      radial-gradient(circle at 85% 75%, rgba(47,143,240,0.08), transparent 28%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 20px;
    gap: 34px;
  }

  .header {
    text-align: center;
    animation: fadeDown 0.6s ease both;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 10px 18px;
    margin-bottom: 20px;
    box-shadow: 0 12px 30px rgba(47,143,240,0.08);
  }

  h1 {
    font-family: var(--sans);
    font-size: clamp(42px, 7vw, 86px);
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -0.055em;
    color: var(--text);
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 16px;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    color: var(--muted);
  }

  .card, .history {
    width: 100%;
    max-width: 720px;
  }

  .card {
    background: var(--surface);
    border: 1px solid rgba(219,234,254,0.9);
    border-radius: 34px;
    padding: 34px;
    box-shadow:
      0 30px 80px rgba(47,143,240,0.14),
      0 2px 10px rgba(20,33,61,0.04);
    backdrop-filter: blur(16px);
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .input-label,
  .options-group p,
  .history-title {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: block;
  }

  .input-wrap {
    display: flex;
    align-items: stretch;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 22px;
    overflow: hidden;
    transition: 0.2s ease;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.6);
  }

  .input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 5px var(--accent-dim);
  }

  .prompt-prefix {
    font-family: var(--sans);
    font-size: 24px;
    font-weight: 800;
    color: var(--accent);
    padding: 18px 10px 18px 20px;
    background: transparent;
    display: flex;
    align-items: flex-start;
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    line-height: 1.6;
    padding: 18px 18px 18px 8px;
    resize: none;
    min-height: 105px;
  }

  textarea::placeholder { color: #a8b3c7; }

  .examples {
    margin-top: 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .example,
  .options-group label {
    border: 1px solid var(--border);
    background: #fff;
    color: var(--muted);
    border-radius: 999px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.18s ease;
    user-select: none;
  }

  .example {
    padding: 9px 14px;
    white-space: nowrap;
  }

  .example:hover,
  .options-group label:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
    transform: translateY(-1px);
  }

  .options-group { margin-top: 24px; }

  .options-group .opts {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .options-group label {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 10px 15px;
  }

  .options-group input[type="checkbox"] { display: none; }

  .options-group input[type="checkbox"]:checked + span {
    color: var(--accent);
  }

  .options-group label:has(input:checked),
  .options-group label.checked {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
    box-shadow: 0 8px 20px rgba(47,143,240,0.10);
  }

  .btn {
    margin-top: 24px;
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: #fff;
    border: none;
    border-radius: 999px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 17px 24px;
    cursor: pointer;
    transition: 0.18s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    box-shadow: 0 16px 36px rgba(47,143,240,0.25);
  }

  .btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 20px 42px rgba(47,143,240,0.32);
  }

  .btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    transform: none;
  }

  .btn .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }

  .btn.loading .spinner { display: block; }
  .btn.loading .btn-text { opacity: 0.8; }

  #printDrop {
    min-height: 128px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    padding: 22px;
    border-style: dashed;
    background: #fff;
    transition: 0.18s ease;
  }

  #printDrop:hover {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  #printText {
    font-family: var(--sans) !important;
    font-size: 13px !important;
    font-weight: 700;
    color: var(--muted) !important;
    text-align: center;
  }

  #printPreview {
    border-radius: 22px;
    border: 1px solid var(--border) !important;
    background: #fff;
  }

  .status-box {
    margin-top: 22px;
    padding: 18px;
    border: 1px solid var(--border);
    border-radius: 22px;
    background: #fff;
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.6;
    display: none;
  }

  .status-box.visible { display: block; animation: fadeUp 0.3s ease both; }
  .status-box.success { border-color: rgba(47,143,240,0.45); background: var(--accent-dim); }
  .status-box.error { border-color: rgba(239,68,68,0.45); background: rgba(239,68,68,0.06); }

  .status-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .status-box.success .status-label { color: var(--accent); }
  .status-box.error .status-label { color: var(--error); }
  .status-message { color: var(--text); font-weight: 600; }

  .poll-badge {
    display: none;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
  }

  .poll-badge.visible { display: flex; }

  .poll-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.2s ease infinite;
  }

  .history {
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 18px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.86);
    border-radius: 22px;
    gap: 14px;
    box-shadow: 0 12px 28px rgba(47,143,240,0.08);
    animation: fadeUp 0.3s ease both;
  }

  .history-cmd {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .history-badge {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 800;
    padding: 6px 10px;
    border: 1px solid;
    border-radius: 999px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .badge-novo { color: #7b8498; border-color: #dbeafe; background: #fff; }
  .badge-processando { color: #d97706; border-color: rgba(217,119,6,0.25); background: rgba(217,119,6,0.08); }
  .badge-concluido { color: var(--accent); border-color: rgba(47,143,240,0.35); background: var(--accent-dim); }
  .badge-erro { color: var(--error); border-color: rgba(239,68,68,0.35); background: rgba(239,68,68,0.06); }

  @keyframes fadeDown {
    from { opacity:0; transform:translateY(-18px); }
    to { opacity:1; transform:translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(18px); }
    to { opacity:1; transform:translateY(0); }
  }

  @keyframes spin { to { transform:rotate(360deg); } }

  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.45; transform:scale(0.82); }
  }

  @media (max-width: 640px) {
    .wrapper { padding: 34px 14px; }
    .card { padding: 24px; border-radius: 28px; }
    .tag { font-size: 12px; }
    .example, .options-group label { font-size: 11px; }
  }
</style>
