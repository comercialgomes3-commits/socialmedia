<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comando Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f6fbff;
  --surface: rgba(255,255,255,0.92);
  --border: #dcecff;
  --accent: #2f8ff0;
  --accent-dark: #1f6fd1;
  --accent-dim: rgba(47,143,240,0.10);
  --text: #20243a;
  --muted: #7b8498;
  --error: #ef4444;
--sans: 'Inter', sans-serif;
--mono: 'Inter', sans-serif;
}

html, body {
  min-height: 100%;
  background:
    radial-gradient(circle at 20% 10%, rgba(47,143,240,0.13), transparent 30%),
    radial-gradient(circle at 85% 80%, rgba(47,143,240,0.10), transparent 32%),
    linear-gradient(180deg, #ffffff 0%, #eef7ff 100%);
  color: var(--text);
  font-family: var(--sans);
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: transparent;
  pointer-events: none;
  z-index: 0;
}

.wrapper {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 46px 20px;
  gap: 34px;
}

.header {
  text-align: center;
  animation: fadeDown 0.6s ease both;
}

.tag {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 10px 18px;
  margin-bottom: 20px;
  box-shadow: 0 12px 30px rgba(47,143,240,0.08);
}

h1 {
  font-family: var(--sans);
  font-size: clamp(42px, 7vw, 82px);
  font-weight: 800;
  line-height: 0.95;
  letter-spacing: -0.055em;
  color: var(--text);
}

h1 span { color: var(--accent); }

.subtitle {
  margin-top: 16px;
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 600;
  color: var(--muted);
}

.card {
  width: 100%;
  max-width: 720px;
  background: var(--surface);
  border: 1px solid rgba(220,236,255,0.95);
  border-radius: 34px;
  padding: 34px;
  box-shadow: 0 30px 80px rgba(47,143,240,0.14);
  backdrop-filter: blur(16px);
  animation: fadeUp 0.6s 0.1s ease both;
}

.input-label,
.options-group p,
.history-title {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
  display: block;
}

.input-wrap {
  display: flex;
  align-items: stretch;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 22px;
  overflow: hidden;
  transition: 0.2s ease;
}

.input-wrap:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 5px var(--accent-dim);
}

.prompt-prefix {
  font-family: var(--sans);
  font-size: 24px;
  font-weight: 800;
  color: var(--accent);
  padding: 18px 10px 18px 20px;
  background: transparent;
  user-select: none;
  flex-shrink: 0;
  display: flex;
  align-items: flex-start;
}

textarea {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 600;
  line-height: 1.6;
  padding: 18px 18px 18px 8px;
  resize: none;
  min-height: 105px;
}

textarea::placeholder { color: #a8b3c7; }

.examples {
  margin-top: 14px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.example {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 9px 14px;
  cursor: pointer;
  transition: 0.18s ease;
  background: #fff;
  white-space: nowrap;
}

.example:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-dim);
  transform: translateY(-1px);
}

.options-group {
  margin-top: 24px;
}

.options-group .opts {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.options-group label {
  display: flex;
  align-items: center;
  gap: 7px;
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 10px 15px;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  transition: 0.18s ease;
  user-select: none;
  background: #fff;
}

.options-group label:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-dim);
}

.options-group input[type="checkbox"] {
  display: none;
}

.options-group input[type="checkbox"]:checked + span {
  color: var(--accent);
}

.options-group label:has(input:checked),
.options-group label.checked {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-dim);
  box-shadow: 0 8px 20px rgba(47,143,240,0.10);
}

.btn {
  margin-top: 24px;
  width: 100%;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  color: #fff;
  border: none;
  border-radius: 999px;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 17px 24px;
  cursor: pointer;
  transition: 0.18s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  box-shadow: 0 16px 36px rgba(47,143,240,0.25);
}

.btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 20px 42px rgba(47,143,240,0.32);
}

.btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
  transform: none;
}

.btn .spinner {
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.35);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  display: none;
}

.btn.loading .spinner { display: block; }
.btn.loading .btn-text { opacity: 0.8; }

.status-box {
  margin-top: 22px;
  padding: 18px;
  border: 1px solid var(--border);
  border-radius: 22px;
  background: #fff;
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.6;
  display: none;
}

.status-box.visible {
  display: block;
  animation: fadeUp 0.3s ease both;
}

.status-box.success {
  border-color: rgba(47,143,240,0.45);
  background: var(--accent-dim);
}

.status-box.error {
  border-color: rgba(239,68,68,0.45);
  background: rgba(239,68,68,0.06);
}

.status-label {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.status-box.success .status-label { color: var(--accent); }
.status-box.error .status-label { color: var(--error); }

.status-message {
  color: var(--text);
  font-weight: 600;
}

.poll-badge {
  display: none;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
}

.poll-badge.visible { display: flex; }

.poll-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 1.2s ease infinite;
}

.history {
  width: 100%;
  max-width: 720px;
  animation: fadeUp 0.6s 0.2s ease both;
}

.history-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.history-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 18px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.86);
  border-radius: 22px;
  gap: 14px;
  box-shadow: 0 12px 28px rgba(47,143,240,0.08);
  animation: fadeUp 0.3s ease both;
}

.history-cmd {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.history-badge {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 800;
  padding: 6px 10px;
  border: 1px solid;
  border-radius: 999px;
  white-space: nowrap;
  flex-shrink: 0;
}

.badge-novo {
  color: #7b8498;
  border-color: #dbeafe;
  background: #fff;
}

.badge-processando {
  color: #d97706;
  border-color: rgba(217,119,6,0.25);
  background: rgba(217,119,6,0.08);
}

.badge-concluido {
  color: var(--accent);
  border-color: rgba(47,143,240,0.35);
  background: var(--accent-dim);
}

.badge-erro {
  color: var(--error);
  border-color: rgba(239,68,68,0.35);
  background: rgba(239,68,68,0.06);
}

#printDrop {
  min-height: 128px !important;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  padding: 22px !important;
  border-style: dashed;
  background: #fff;
  transition: 0.18s ease;
}

#printDrop:hover {
  border-color: var(--accent);
  background: var(--accent-dim);
}

#printText {
  font-family: var(--sans) !important;
  font-size: 13px !important;
  font-weight: 700;
  color: var(--muted) !important;
  text-align: center;
}

#printPreview {
  border-radius: 22px;
  border: 1px solid var(--border) !important;
  background: #fff;
}

@keyframes fadeDown {
  from { opacity:0; transform:translateY(-18px); }
  to { opacity:1; transform:translateY(0); }
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(18px); }
  to { opacity:1; transform:translateY(0); }
}

@keyframes spin {
  to { transform:rotate(360deg); }
}

@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.45; transform:scale(0.82); }
}

@media (max-width: 640px) {
  .wrapper { padding: 34px 14px; }
  .card { padding: 24px; border-radius: 28px; }
  .tag { font-size: 12px; }
  .example, .options-group label { font-size: 11px; }
}
</style>
</head>
<body>
  <div class="wrapper">

    <div class="header">
      <div class="tag">Comercial Gomes ◆ Social Media</div>
      <h1>Comando<span>.</span></h1>
      <p class="subtitle">// digite → IA interpreta → agenda automaticamente</p>
    </div>

    <div class="card">
      <label class="input-label">Novo comando</label>
      <div class="input-wrap">
        <span class="prompt-prefix">›</span>
        <textarea id="comandoInput" placeholder="ex: reels decor entrecasa amanhã&#10;ex: status vasos mabruk hoje&#10;ex: 4 reels essa semana" rows="3"></textarea>
      </div>

     <div class="examples">

  <!-- 🧠 Inteligente -->
  <button class="example" onclick="fillExample('programar para essa semana: preencher com reels e status')">
    preencher semana
  </button>

  <!-- 🎥 Reels -->
  <button class="example" onclick="fillExample('programar para essa semana: 4 reels de achadinhos')">
    4 reels achadinhos
  </button>

  <button class="example" onclick="fillExample('programar para essa semana: reels de produtos mais vendidos')">
    reels mais vendidos
  </button>

  <!-- 📱 Status -->
  <button class="example" onclick="fillExample('programar para hoje: 2 status de novidades')">
    status hoje
  </button>

  <!-- 💰 Conversão -->
  <button class="example" onclick="fillExample('programar para sábado: carrossel de promoção')">
    carrossel promoção
  </button>

  <!-- 🎬 Lifestyle -->
  <button class="example" onclick="fillExample('programar para amanhã: reels de tour pela loja')">
    tour loja
  </button>

</div>

      <div class="options-group">
        <p>Tipo (opcional — sobrescreve a IA)</p>
        <div class="opts">
          <label><input type="checkbox" name="tipo" value="Reels"><span>Reels</span></label>
          <label><input type="checkbox" name="tipo" value="Carrossel"><span>Carrossel</span></label>
          <label><input type="checkbox" name="tipo" value="Post"><span>Post</span></label>
          <label><input type="checkbox" name="tipo" value="Status"><span>Status</span></label>
        </div>
      </div>

      <div class="options-group">
        <p>Plataforma (opcional — sobrescreve a IA)</p>
        <div class="opts">
          <label><input type="checkbox" name="plataforma" value="Instagram"><span>Instagram</span></label>
          <label><input type="checkbox" name="plataforma" value="TikTok"><span>TikTok</span></label>
          <label><input type="checkbox" name="plataforma" value="WhatsApp"><span>WhatsApp</span></label>
        </div>
      </div>

      <div class="options-group">
  <p>Print do editor</p>

  <div class="input-wrap" id="printDrop" style="min-height:120px; cursor:pointer; align-items:center; justify-content:center; padding:20px;">
    <input type="file" id="printInput" accept="image/*" style="display:none;">
    <span id="printText" style="font-family:var(--mono); font-size:12px; color:var(--muted);">
      Cole o print com Ctrl+V ou clique aqui para selecionar
    </span>
  </div>

  <img id="printPreview" style="display:none; width:100%; max-height:260px; object-fit:contain; margin-top:12px; border:1px solid var(--border);">

  <button class="btn" id="printBtn" type="button" onclick="enviarPrint()" disabled>
    <div class="spinner"></div>
    <span class="btn-text">Agendar Print no Notion</span>
  </button>
</div>
      
      <button class="btn" id="enviarBtn" onclick="enviarComando()">
        <div class="spinner"></div>
        <span class="btn-text">Enviar Comando</span>
      </button>

      <div class="status-box" id="statusBox">
        <div class="status-label" id="statusLabel"></div>
        <div class="status-message" id="statusMessage"></div>
        <div class="poll-badge" id="pollBadge">
          <div class="poll-dot"></div>
          aguardando Make processar...
        </div>
      </div>
    </div>

    <div class="history" id="historySection" style="display:none">
      <div class="history-title">// histórico da sessão</div>
      <div class="history-list" id="historyList"></div>
    </div>

  </div>

  <script>
    const sessionHistory = [];

    // Fallback para :has() — marca label como .checked ao clicar
    document.querySelectorAll('.options-group input[type="checkbox"]').forEach(cb => {
      cb.addEventListener('change', () => {
        cb.closest('label').classList.toggle('checked', cb.checked);
      });
    });

    function fillExample(text) {
      document.getElementById('comandoInput').value = text;
      document.getElementById('comandoInput').focus();
    }

    function showStatus(type, label, message, polling = false) {
      const box = document.getElementById('statusBox');
      const lbl = document.getElementById('statusLabel');
      const msg = document.getElementById('statusMessage');
      const poll = document.getElementById('pollBadge');
      box.className = 'status-box visible ' + type;
      lbl.textContent = label;
      msg.textContent = message;
      poll.classList.toggle('visible', polling);
    }

    function addToHistory(comando, itemId) {
      const item = { comando, itemId, status: 'Novo' };
      sessionHistory.unshift(item);
      renderHistory();
      startPolling(item);
    }

    function renderHistory() {
      const section = document.getElementById('historySection');
      const list = document.getElementById('historyList');
      section.style.display = sessionHistory.length ? 'block' : 'none';
      list.innerHTML = sessionHistory.slice(0, 8).map((item, i) => {
        const badge = {
          'Novo': 'badge-novo',
          'Processando': 'badge-processando',
          'Concluído': 'badge-concluido',
          'Erro': 'badge-erro'
        }[item.status] || 'badge-novo';
        return `<div class="history-item" style="animation-delay:${i * 0.05}s">
          <span class="history-cmd">› ${escapeHtml(item.comando)}</span>
          <span class="history-badge ${badge}">${item.status}</span>
        </div>`;
      }).join('');
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function startPolling(item) {
      if (!item.itemId) return;
      let attempts = 0;
      const interval = setInterval(async () => {
        attempts++;
        try {
          const res = await fetch('/api/status/' + item.itemId);
          const data = await res.json();
          if (data.status) { item.status = data.status; renderHistory(); }
          if (data.status === 'Concluído') {
            clearInterval(interval);
            showStatus('success', '✓ concluído', data.resultado || 'Agendado com sucesso!');
          } else if (data.status === 'Erro') {
            clearInterval(interval);
            showStatus('error', '✗ erro', data.resultado || 'Erro durante o processamento.');
          }
        } catch (e) {}
        if (attempts >= 24) clearInterval(interval);
      }, 5000);
    }

    async function enviarComando() {
      const input = document.getElementById('comandoInput');
      const btn = document.getElementById('enviarBtn');
      const comando = input.value.trim();

      if (!comando) {
        showStatus('error', '✗ vazio', 'Digite um comando antes de enviar.');
        return;
      }

      const tipoManual = Array.from(document.querySelectorAll('input[name="tipo"]:checked')).map(i => i.value);
      const plataformaManual = Array.from(document.querySelectorAll('input[name="plataforma"]:checked')).map(i => i.value);

      btn.disabled = true;
      btn.classList.add('loading');
      document.getElementById('statusBox').className = 'status-box';

      try {
        const res = await fetch('/api/comando', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ comando, tipoManual, plataformaManual })
        });

        const data = await res.json();

        if (!res.ok) {
          showStatus('error', '✗ erro', data.error || 'Erro ao enviar comando.');
        } else {
          showStatus('success', '✓ enviado', data.message || 'Comando enviado com sucesso!', false);
          // usa o id do primeiro item criado para histórico
          const primeiroId = data.itens && data.itens[0] ? data.itens[0].id : null;
          addToHistory(comando, primeiroId);
          input.value = '';
        }
      } catch (e) {
        showStatus('error', '✗ erro de rede', 'Não foi possível conectar ao servidor.');
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    }

    document.getElementById('comandoInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        enviarComando();
      }
    });

    let printBase64 = null;

const printDrop = document.getElementById('printDrop');
const printInput = document.getElementById('printInput');
const printPreview = document.getElementById('printPreview');
const printText = document.getElementById('printText');
const printBtn = document.getElementById('printBtn');

printDrop.addEventListener('click', () => {
  printInput.click();
});

printInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) carregarPrint(file);
});

document.addEventListener('paste', (e) => {
  const items = e.clipboardData?.items;
  if (!items) return;

  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const file = item.getAsFile();
      carregarPrint(file);
      break;
    }
  }
});

function carregarPrint(file) {
  const reader = new FileReader();

  reader.onload = (e) => {
    printBase64 = e.target.result;
    printPreview.src = e.target.result;
    printPreview.style.display = 'block';
    printText.textContent = 'Print carregado. Clique em “Agendar Print no Notion”.';
    printBtn.disabled = false;
  };

  reader.readAsDataURL(file);
}

async function enviarPrint() {
  if (!printBase64) {
    showStatus('error', '✗ sem print', 'Cole ou selecione um print antes de enviar.');
    return;
  }

  printBtn.disabled = true;
  printBtn.classList.add('loading');
  document.getElementById('statusBox').className = 'status-box';

  try {
    const res = await fetch('/api/interpretar-print', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        imagemBase64: printBase64,
        autoAgendar: true,
        instrucoes: `
          Leia o print da lista do editor.
          Identifique todos os vídeos/conteúdos.
          Se tiver REELS, use tipo Reels e plataforma Instagram.
          Se tiver STATUS, use tipo Status e plataforma WhatsApp.
          Se tiver POST, use tipo Post e plataforma Instagram.
          Se tiver CARROSSEL, use tipo Carrossel e plataforma Instagram.
          Use o nome do arquivo como tema limpo.
          Agende diretamente no Notion.
        `
      })
    });

    const data = await res.json();

    if (!res.ok || !data.success) {
      showStatus('error', '✗ erro', data.error || 'Erro ao interpretar print.');
      return;
    }

    showStatus(
      'success',
      '✓ print agendado',
      data.message || `${data.total || 0} conteúdo(s) agendado(s) no Notion.`
    );

    printBase64 = null;
    printInput.value = '';
    printPreview.style.display = 'none';
    printBtn.disabled = true;
    printText.textContent = 'Cole o print com Ctrl+V ou clique aqui para selecionar';

    addToHistory('Print do editor agendado', data.itens && data.itens[0] ? data.itens[0].id : null);

  } catch (e) {
    showStatus('error', '✗ erro de rede', 'Não foi possível conectar ao servidor.');
  } finally {
    printBtn.disabled = false;
    printBtn.classList.remove('loading');
  }
}
  </script>
</body>
</html>
