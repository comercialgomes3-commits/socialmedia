<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Comando Social</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#f5f9ff;
  --card:#ffffff;
  --border:#dbeafe;
  --accent:#2f8ff0;
  --text:#1e293b;
  --muted:#7b8498;
}

body{
  font-family:'Syne',sans-serif;
  background:linear-gradient(180deg,#ffffff,#eef6ff);
  color:var(--text);
}

.wrapper{
  max-width:720px;
  margin:auto;
  padding:40px 20px;
}

.header{text-align:center;margin-bottom:30px;}

.tag{
  display:inline-block;
  padding:8px 16px;
  border-radius:999px;
  border:1px solid var(--border);
  color:var(--accent);
  font-weight:700;
  margin-bottom:20px;
}

h1{
  font-size:clamp(40px,6vw,70px);
  font-weight:800;
}

.subtitle{
  margin-top:10px;
  color:var(--muted);
  font-size:14px;
}

.card{
  background:var(--card);
  padding:30px;
  border-radius:30px;
  border:1px solid var(--border);
  box-shadow:0 20px 60px rgba(47,143,240,0.1);
}

.input-label{
  font-size:12px;
  font-weight:700;
  margin-bottom:10px;
  color:var(--muted);
}

.input-wrap{
  display:flex;
  border:1px solid var(--border);
  border-radius:20px;
  overflow:hidden;
}

.prompt-prefix{
  padding:15px;
  color:var(--accent);
  font-weight:800;
}

textarea{
  flex:1;
  border:none;
  outline:none;
  padding:15px;
  font-size:14px;
}

.examples{
  margin-top:10px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.example{
  padding:8px 12px;
  border-radius:999px;
  border:1px solid var(--border);
  cursor:pointer;
  font-size:12px;
}

.options-group{margin-top:20px;}

.options-group .opts{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.options-group label{
  padding:8px 14px;
  border-radius:999px;
  border:1px solid var(--border);
  cursor:pointer;
  font-size:12px;
}

.options-group input{display:none;}

.options-group input:checked + span{
  color:var(--accent);
}

.options-group label.checked{
  background:#eaf3ff;
  border-color:var(--accent);
}

.btn{
  margin-top:20px;
  width:100%;
  padding:16px;
  border:none;
  border-radius:999px;
  background:var(--accent);
  color:#fff;
  font-weight:800;
  cursor:pointer;
}

.status-box{
  margin-top:20px;
  padding:15px;
  border-radius:20px;
  border:1px solid var(--border);
  display:none;
}

.status-box.visible{display:block;}

.history{margin-top:30px;}

.history-item{
  padding:12px;
  border:1px solid var(--border);
  border-radius:20px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="header">
<div class="tag">Comercial Gomes</div>
<h1>Comando<span style="color:#2f8ff0;">.</span></h1>
<p class="subtitle">Digite → IA interpreta → agenda</p>
</div>

<div class="card">

<label class="input-label">Novo comando</label>

<div class="input-wrap">
<span class="prompt-prefix">›</span>
<textarea id="comandoInput"></textarea>
</div>

<div class="examples">
<button class="example" onclick="fillExample('4 reels essa semana')">4 reels</button>
<button class="example" onclick="fillExample('status hoje')">status</button>
<button class="example" onclick="fillExample('carrossel promoção')">promo</button>
</div>

<div class="options-group">
<p>Tipo</p>
<div class="opts">
<label><input type="checkbox" name="tipo" value="Reels"><span>Reels</span></label>
<label><input type="checkbox" name="tipo" value="Carrossel"><span>Carrossel</span></label>
<label><input type="checkbox" name="tipo" value="Post"><span>Post</span></label>
<label><input type="checkbox" name="tipo" value="Status"><span>Status</span></label>
</div>
</div>

<div class="options-group">
<p>Plataforma</p>
<div class="opts">
<label><input type="checkbox" name="plataforma" value="Instagram"><span>Instagram</span></label>
<label><input type="checkbox" name="plataforma" value="TikTok"><span>TikTok</span></label>
<label><input type="checkbox" name="plataforma" value="WhatsApp"><span>WhatsApp</span></label>
</div>
</div>

<button class="btn" onclick="enviarComando()">Enviar</button>

<div class="status-box" id="statusBox"></div>

</div>

<div class="history" id="historySection"></div>

</div>

<script>
function fillExample(text){
document.getElementById('comandoInput').value=text;
}

document.querySelectorAll('input[type=checkbox]').forEach(cb=>{
cb.addEventListener('change',()=>{
cb.parentElement.classList.toggle('checked',cb.checked);
});
});

async function enviarComando(){
const comando=document.getElementById('comandoInput').value;

const tipoManual=[...document.querySelectorAll('input[name=tipo]:checked')].map(i=>i.value);
const plataformaManual=[...document.querySelectorAll('input[name=plataforma]:checked')].map(i=>i.value);

const res=await fetch('/api/comando',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({comando,tipoManual,plataformaManual})
});

const data=await res.json();

const box=document.getElementById('statusBox');
box.classList.add('visible');
box.innerText=data.message || 'Enviado';
}
</script>

</body>
</html>
